name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main # also deploy from your current working branch
pull_request:
    branches:
      - main

  # Allow manually triggering the workflow from the Actions tab
workflow_dispatch:

# Grant the GITHUB_TOKEN permission to push to gh-pages
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node.js (match your local version) ────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── 3. Install dependencies ──────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Build – Vite reads VITE_* variables from the environment ─────────
      #   Each secret is mapped from GitHub Secrets → VITE_* env var so that
      #   import.meta.env.VITE_* works correctly in the compiled bundle.
      - name: Build Vite app
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}
          VITE_USER_EMAIL: ${{ secrets.VITE_USER_EMAIL }}
          VITE_USER_SECRET: ${{ secrets.VITE_USER_SECRET }}
          VITE_DEVICE_ID: ${{ secrets.VITE_DEVICE_ID }}

     # ── 5. Deploy to Vercel ─────────────────────────────────────────────
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }} # Required
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }} # Required
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }} # Required
          vercel-args: '--prod' # This makes the deployment live (Production)
          working-directory: ./