name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# Grant the GITHUB_TOKEN permission to push to gh-pages
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node.js (match your local version) ────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── 3. Install dependencies ──────────────────────────────────────────────
      - name: Install dependencies
        run: npm install

      # ── 4. Build – Vite reads VITE_* variables from the environment ─────────
      #   Each secret is mapped from GitHub Secrets → VITE_* env var so that
      #   import.meta.env.VITE_* works correctly in the compiled bundle.
      - name: Build Vite app
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}
          VITE_USER_EMAIL: ${{ secrets.VITE_USER_EMAIL }}
          VITE_USER_SECRET: ${{ secrets.VITE_USER_SECRET }}
          VITE_DEVICE_ID: ${{ secrets.VITE_DEVICE_ID }}

      # ── 5. Deploy to GitHub Pages ──────────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist